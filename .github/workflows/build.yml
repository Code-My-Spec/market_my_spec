name: Build & Push image

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - ".kamal/**"
      - "config/deploy*.yml"
      - "scripts/**"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/code-my-spec/market_my_spec:${{ github.sha }}
            ghcr.io/code-my-spec/market_my_spec:latest
          labels: |
            service=market-my-spec
          cache-from: type=registry,ref=ghcr.io/code-my-spec/market_my_spec:buildcache
          cache-to: type=registry,ref=ghcr.io/code-my-spec/market_my_spec:buildcache,mode=max
