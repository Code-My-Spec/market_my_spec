name: Release MMS Agent

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Must already exist."
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.burrito_target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - burrito_target: macos_m1
            runner: macos-14
            output_name: market_my_spec_agent_macos_m1

    env:
      MIX_ENV: prod_agent
      BURRITO_TARGET: ${{ matrix.burrito_target }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.1"
          elixir-version: "1.19.4"

      - name: Install Zig 0.15.2
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Verify Zig
        run: zig version

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/prod_agent
          key: ${{ runner.os }}-${{ matrix.burrito_target }}-mix-${{ hashFiles('mix.lock') }}

      - name: Fetch deps
        run: mix deps.get

      - name: Compile deps
        run: mix deps.compile

      - name: Build Burrito binary
        run: mix release market_my_spec_agent --overwrite

      - name: Compute SHA256
        run: |
          shasum -a 256 burrito_out/${{ matrix.output_name }} \
            | awk '{print $1}' > burrito_out/${{ matrix.output_name }}.sha256
          cat burrito_out/${{ matrix.output_name }}.sha256

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: |
            burrito_out/${{ matrix.output_name }}
            burrito_out/${{ matrix.output_name }}.sha256
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha_macos_m1: ${{ steps.shas.outputs.macos_m1 }}

    steps:
      - name: Resolve tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Read per-asset SHA256s
        id: shas
        run: |
          for target in macos_m1; do
            sha=$(cat "artifacts/market_my_spec_agent_${target}.sha256")
            echo "$target=$sha" >> "$GITHUB_OUTPUT"
          done

      - name: Build SHA256SUMS manifest
        run: |
          cd artifacts
          {
            for target in macos_m1; do
              sha=$(cat "market_my_spec_agent_${target}.sha256")
              echo "$sha  market_my_spec_agent_${target}"
            done
          } > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release and upload binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            artifacts/market_my_spec_agent_macos_m1 \
            artifacts/SHA256SUMS.txt \
            --repo "${{ github.repository }}" \
            --title "MMS Agent ${{ steps.version.outputs.tag }}" \
            --notes "MMS Agent ${{ steps.version.outputs.tag }} — Apple Silicon only for v0.1.0. Install: \`brew install code-my-spec/mms-agent/mms-agent\` once the formula bumps."

  update_formula:
    name: Update Homebrew formula
    needs: release
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' || github.event.inputs.tag != ''

    steps:
      - name: Check out tap repo
        uses: actions/checkout@v4
        with:
          repository: Code-My-Spec/homebrew-mms-agent
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        env:
          VERSION: ${{ needs.release.outputs.version }}
          SHA_MACOS_M1: ${{ needs.release.outputs.sha_macos_m1 }}
          BASE_URL: https://github.com/${{ github.repository }}/releases/download
        run: |
          mkdir -p tap/Formula
          cat > tap/Formula/mms-agent.rb <<EOF
          class MmsAgent < Formula
            desc "MMS Agent — local pairing companion for Market My Spec"
            homepage "https://marketmyspec.com"
            version "${VERSION}"
            license "Proprietary"

            depends_on :macos
            depends_on arch: :arm64

            url "${BASE_URL}/v${VERSION}/market_my_spec_agent_macos_m1"
            sha256 "${SHA_MACOS_M1}"

            def install
              src = stable.url.split("/").last
              bin.install src => "mms-agent"
            end

            test do
              assert_match "mms-agent", shell_output("#{bin}/mms-agent help")
            end
          end
          EOF
          cat tap/Formula/mms-agent.rb

      - name: Commit and push
        working-directory: tap
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          git config user.name "mms-agent-release-bot"
          git config user.email "release-bot@marketmyspec.com"
          git add Formula/mms-agent.rb
          if git diff --cached --quiet; then
            echo "No formula change."
            exit 0
          fi
          git commit -m "Bump mms-agent to v${VERSION}"
          git push
