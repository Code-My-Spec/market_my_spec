# Kamal config for market_my_spec PROD on the Hetzner box.
# Run with: kamal deploy
#
# Notes:
# - kamal-proxy serves traffic on :80/:443 directly (Caddy retired
#   2026-05-07). Routes are registered automatically on `kamal deploy`.
# - db_net is pre-attached so the container can reach infra-postgres-1
#   at start time (before the post-deploy hook runs).
# - Secrets come from AWS SSM Parameter Store via .kamal/secrets-common,
#   which is sourced from the deploy script's env (set up by render-env).

service: market-my-spec
image: code-my-spec/market_my_spec

servers:
  web:
    hosts:
      - 178.156.143.212
    options:
      network: db_net

proxy:
  ssl: true
  host: marketmyspec.com
  app_port: 4000

registry:
  server: ghcr.io
  username: johns10
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  local: true

env:
  secret:
    - DATABASE_URL
    - SECRET_KEY_BASE
    - PHX_HOST
    - PHX_SERVER
    - CLOAK_KEY
    - RESEND_API_KEY
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - AWS_REGION
    - S3_BUCKET
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - GITHUB_CLIENT_ID
    - GITHUB_CLIENT_SECRET

ssh:
  user: root
