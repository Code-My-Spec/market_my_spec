# Kamal config for market_my_spec PROD on the Hetzner box.
# Run with: kamal deploy
#
# Notes:
# - kamal-proxy serves traffic on :80/:443 directly. Routes registered
#   automatically on `kamal deploy`.
# - db_net is pre-attached so the container can reach infra-postgres-1
#   at start time.
# - SSM-bootstrap secrets pattern: Kamal carries only AWS bootstrap
#   creds + APP_ENV/AWS_REGION; the container fetches all app secrets
#   from /market_my_spec/<APP_ENV>/* at boot via
#   MarketMySpec.Secrets.load!/1 (see lib/market_my_spec/secrets.ex).

service: market-my-spec
image: code-my-spec/market_my_spec

servers:
  web:
    hosts:
      - 178.156.143.212
    options:
      network: db_net

proxy:
  ssl: true
  host: marketmyspec.com
  app_port: 4000

registry:
  server: ghcr.io
  username: johns10
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  local: true

env:
  clear:
    APP_ENV: prod
    AWS_REGION: us-east-1
  secret:
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY

ssh:
  user: root
