# Kamal config for market_my_spec PROD on the Hetzner box.
# Run with: kamal deploy
#
# Notes:
# - kamal-proxy is intentionally disabled (proxy: false). The shared Caddy
#   in /opt/shared/ continues to terminate TLS and route. When all 4 apps
#   on the box are on Kamal, the Caddy → kamal-proxy swap happens once.
# - Container is attached to caddy_proxy at deploy time and to db_net via
#   the post-deploy hook so it can reach infra-postgres-1.
# - Secrets come from AWS SSM Parameter Store via .kamal/secrets, which
#   shells out to ~/Documents/github/devops/scripts/render-env.

service: market-my-spec
image: code-my-spec/market_my_spec

servers:
  web:
    hosts:
      - 178.156.143.212
    options:
      network: caddy_proxy
      network-alias: market-my-spec-prod-web

registry:
  server: ghcr.io
  username: johns10
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  local: true

env:
  secret:
    - DATABASE_URL
    - SECRET_KEY_BASE
    - PHX_HOST
    - PHX_SERVER
    - CLOAK_KEY
    - RESEND_API_KEY
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - AWS_REGION
    - S3_BUCKET
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - GITHUB_CLIENT_ID
    - GITHUB_CLIENT_SECRET

ssh:
  user: root
