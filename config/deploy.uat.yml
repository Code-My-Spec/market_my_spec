# Kamal config for market_my_spec UAT. Same shape as deploy.yml, with
# different network alias and SSM env path.
#
# Run with: kamal deploy -d uat

service: market-my-spec-uat
image: code-my-spec/market_my_spec

servers:
  web:
    hosts:
      - 178.156.143.212
    options:
      network: caddy_proxy
      network-alias: market-my-spec-uat-web

registry:
  server: ghcr.io
  username: johns10
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  local: true

env:
  secret:
    - DATABASE_URL
    - SECRET_KEY_BASE
    - PHX_HOST
    - PHX_SERVER
    - CLOAK_KEY
    - RESEND_API_KEY
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - AWS_REGION
    - S3_BUCKET
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - GITHUB_CLIENT_ID
    - GITHUB_CLIENT_SECRET

ssh:
  user: root
