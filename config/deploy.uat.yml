# Kamal config for market_my_spec UAT. Same shape as deploy.yml, with
# different network alias and SSM env path.
#
# Run with: kamal deploy -d uat

service: market-my-spec
image: code-my-spec/market_my_spec

servers:
  web:
    hosts:
      - 46.225.105.88           # UAT box (Hetzner cax11 ARM, Nuremberg)
    options:
      network: db_net           # pre-attach so app can reach infra-postgres-1 at start
    proxy:                      # role-level override of deploy.yml's `proxy: false`
      ssl: true
      host: uat.marketmyspec.com
      app_port: 4000

registry:
  server: ghcr.io
  username: johns10
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: arm64
  local: true

env:
  secret:
    - DATABASE_URL
    - SECRET_KEY_BASE
    - PHX_HOST
    - PHX_SERVER
    - CLOAK_KEY
    - RESEND_API_KEY
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - AWS_REGION
    - S3_BUCKET
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - GITHUB_CLIENT_ID
    - GITHUB_CLIENT_SECRET

ssh:
  user: root
